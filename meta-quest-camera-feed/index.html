<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Camera + Digital Twin</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --panel-bg: rgba(4, 12, 25, 0.68);
        --panel-border: rgba(130, 220, 255, 0.35);
        --text-main: #e8f8ff;
        --text-subtle: #9fb8c4;
        --good: #7ef4a6;
        --bad: #ff7d7d;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #02060f;
      }

      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: min(380px, calc(100vw - 24px));
        background: linear-gradient(180deg, rgba(14, 40, 68, 0.78), var(--panel-bg));
        border: 1px solid var(--panel-border);
        border-radius: 14px;
        padding: 12px;
        color: var(--text-main);
        backdrop-filter: blur(8px);
      }

      #hud h1 {
        margin: 0 0 8px 0;
        font-size: 15px;
        font-weight: 650;
        letter-spacing: 0.04em;
      }

      #status {
        margin: 0 0 8px 0;
        font-size: 13px;
        color: var(--text-subtle);
      }

      .status-good {
        color: var(--good);
      }

      .status-bad {
        color: var(--bad);
      }

      .row {
        display: grid;
        grid-template-columns: 74px 1fr 52px;
        gap: 8px;
        align-items: center;
        margin-bottom: 6px;
        font-size: 12px;
      }

      .row input {
        width: 100%;
      }

      .hint {
        margin-top: 8px;
        font-size: 11px;
        color: var(--text-subtle);
        line-height: 1.35;
      }

      @media (max-width: 680px) {
        #hud {
          top: 8px;
          left: 8px;
          width: min(330px, calc(100vw - 16px));
          padding: 10px;
        }
      }
    </style>
    <script>
      const DEFAULT_STATE = {
        basePosition: { x: 0.0, y: 1.15, z: -1.4 },
        baseRotation: { x: 0.0, y: 180.0, z: 0.0 },
        joints: {
          shoulder: 15.0,
          elbow: -25.0,
          wrist: 10.0,
          wristRotate: 0.0,
          gripper: 0.03
        },
        target: { x: 0.25, y: 1.3, z: -1.0 },
        timestamp: Date.now() / 1000.0
      };

      window.latestRobotState = DEFAULT_STATE;
      window.manualOffset = { x: 0.0, y: 0.0, z: 0.0, ry: 0.0 };

      function clamp(value, minimum, maximum) {
        return Math.max(minimum, Math.min(value, maximum));
      }

      function degToRad(degrees) {
        return (degrees * Math.PI) / 180;
      }

      function mergeRobotState(update) {
        const current = window.latestRobotState;
        window.latestRobotState = {
          ...current,
          ...update,
          basePosition: { ...current.basePosition, ...(update.basePosition || {}) },
          baseRotation: { ...current.baseRotation, ...(update.baseRotation || {}) },
          joints: { ...current.joints, ...(update.joints || {}) },
          target: { ...current.target, ...(update.target || {}) }
        };
      }

      function updateConnectionBadge(ok, detail) {
        const status = document.querySelector("#status");
        if (!status) {
          return;
        }
        status.className = ok ? "status-good" : "status-bad";
        status.textContent = detail;
      }

      function connectRobotStateStream() {
        const source = new EventSource("/robot_state/stream");

        source.onopen = () => {
          updateConnectionBadge(true, "Robot state stream connected");
        };

        source.onmessage = (event) => {
          try {
            const payload = JSON.parse(event.data);
            mergeRobotState(payload);
          } catch (error) {
            updateConnectionBadge(false, "Received invalid state payload");
          }
        };

        source.onerror = () => {
          updateConnectionBadge(false, "Stream lost, retrying...");
        };
      }

      AFRAME.registerComponent("refresh-texture", {
        tick: function () {
          const mesh = this.el.getObject3D("mesh");
          if (!mesh || !mesh.material || !mesh.material.map) {
            return;
          }
          mesh.material.map.needsUpdate = true;
        }
      });

      AFRAME.registerComponent("robot-twin-sync", {
        init: function () {
          this.shoulder = document.querySelector("#joint-shoulder");
          this.elbow = document.querySelector("#joint-elbow");
          this.wrist = document.querySelector("#joint-wrist");
          this.wristRotate = document.querySelector("#joint-wrist-rotate");
          this.gripperLeft = document.querySelector("#gripper-left");
          this.gripperRight = document.querySelector("#gripper-right");
          this.target = document.querySelector("#target-indicator");
        },
        tick: function () {
          const state = window.latestRobotState;
          const manual = window.manualOffset;
          const basePosition = state.basePosition || DEFAULT_STATE.basePosition;
          const baseRotation = state.baseRotation || DEFAULT_STATE.baseRotation;
          const joints = state.joints || DEFAULT_STATE.joints;
          const target = state.target || DEFAULT_STATE.target;

          this.el.object3D.position.set(
            (basePosition.x || 0) + manual.x,
            (basePosition.y || 0) + manual.y,
            (basePosition.z || 0) + manual.z
          );

          this.el.object3D.rotation.set(
            degToRad(baseRotation.x || 0),
            degToRad((baseRotation.y || 0) + manual.ry),
            degToRad(baseRotation.z || 0)
          );

          if (this.shoulder) {
            this.shoulder.object3D.rotation.z = degToRad(clamp(joints.shoulder || 0, -120, 120));
          }
          if (this.elbow) {
            this.elbow.object3D.rotation.z = degToRad(clamp(joints.elbow || 0, -150, 150));
          }
          if (this.wrist) {
            this.wrist.object3D.rotation.z = degToRad(clamp(joints.wrist || 0, -180, 180));
          }
          if (this.wristRotate) {
            this.wristRotate.object3D.rotation.y = degToRad(clamp(joints.wristRotate || 0, -180, 180));
          }

          const gripperGap = clamp(joints.gripper || 0.03, 0.0, 0.12);
          if (this.gripperLeft) {
            this.gripperLeft.object3D.position.x = -0.02 - gripperGap / 2;
          }
          if (this.gripperRight) {
            this.gripperRight.object3D.position.x = 0.02 + gripperGap / 2;
          }

          if (this.target) {
            this.target.object3D.position.set(
              (target.x || 0) + manual.x,
              (target.y || 0) + manual.y,
              (target.z || 0) + manual.z
            );
          }
        }
      });

      function bindAlignmentSliders() {
        const controls = [
          { id: "offset-x", key: "x" },
          { id: "offset-y", key: "y" },
          { id: "offset-z", key: "z" },
          { id: "offset-ry", key: "ry" }
        ];

        controls.forEach((item) => {
          const slider = document.querySelector(`#${item.id}`);
          const value = document.querySelector(`#${item.id}-value`);
          if (!slider || !value) {
            return;
          }

          slider.addEventListener("input", () => {
            window.manualOffset[item.key] = Number(slider.value);
            value.textContent = Number(slider.value).toFixed(2);
          });
        });
      }

      window.addEventListener("DOMContentLoaded", () => {
        connectRobotStateStream();
        bindAlignmentSliders();
      });
    </script>
  </head>
  <body>
    <div id="hud">
      <h1>Digital Twin Overlay</h1>
      <p id="status" class="status-bad">Connecting to robot state stream...</p>

      <div class="row">
        <span>Offset X</span>
        <input id="offset-x" type="range" min="-1.0" max="1.0" step="0.01" value="0.0">
        <span id="offset-x-value">0.00</span>
      </div>
      <div class="row">
        <span>Offset Y</span>
        <input id="offset-y" type="range" min="-1.0" max="1.0" step="0.01" value="0.0">
        <span id="offset-y-value">0.00</span>
      </div>
      <div class="row">
        <span>Offset Z</span>
        <input id="offset-z" type="range" min="-1.0" max="1.0" step="0.01" value="0.0">
        <span id="offset-z-value">0.00</span>
      </div>
      <div class="row">
        <span>Yaw Offset</span>
        <input id="offset-ry" type="range" min="-180" max="180" step="1" value="0.0">
        <span id="offset-ry-value">0.00</span>
      </div>

      <p class="hint">
        Publish robot state updates to POST /robot_state. The model updates in real-time from /robot_state/stream.
      </p>
    </div>

    <a-scene renderer="colorManagement: true; physicallyCorrectLights: true">
      <a-assets>
        <img id="camera-feed" src="/video" crossorigin="anonymous">
      </a-assets>

      <a-entity camera look-controls position="0 1.6 0">
        <a-plane
          position="0 0 -3"
          width="9"
          height="5"
          material="shader: flat; src: #camera-feed; side: double"
          refresh-texture>
        </a-plane>
      </a-entity>

      <a-entity light="type: ambient; color: #d7f0ff; intensity: 0.65"></a-entity>
      <a-entity light="type: directional; color: #ffffff; intensity: 0.7" position="1 3 2"></a-entity>

      <a-plane
        position="0 0 -1.4"
        rotation="-90 0 0"
        width="4"
        height="4"
        color="#0a1d2f"
        opacity="0.25">
      </a-plane>

      <a-entity id="robot-root" robot-twin-sync>
        <a-cylinder radius="0.08" height="0.22" position="0 0.11 0" color="#1c7ed6" opacity="0.75"></a-cylinder>
        <a-sphere radius="0.09" position="0 0.22 0" color="#35b7ff" opacity="0.9"></a-sphere>

        <a-entity id="joint-shoulder" position="0 0.22 0">
          <a-cylinder radius="0.035" height="0.46" position="0 0.23 0" color="#4dabf7" opacity="0.86"></a-cylinder>
          <a-sphere radius="0.055" position="0 0.46 0" color="#9bd8ff" opacity="0.92"></a-sphere>

          <a-entity id="joint-elbow" position="0 0.46 0">
            <a-cylinder radius="0.03" height="0.36" position="0 0.18 0" color="#74c0fc" opacity="0.86"></a-cylinder>
            <a-sphere radius="0.047" position="0 0.36 0" color="#c5ecff" opacity="0.95"></a-sphere>

            <a-entity id="joint-wrist" position="0 0.36 0">
              <a-cylinder radius="0.022" height="0.20" position="0 0.1 0" color="#b2f2ff" opacity="0.9"></a-cylinder>

              <a-entity id="joint-wrist-rotate" position="0 0.2 0">
                <a-box id="gripper-left" width="0.02" height="0.11" depth="0.02" position="-0.035 0.06 0" color="#38d9a9"></a-box>
                <a-box id="gripper-right" width="0.02" height="0.11" depth="0.02" position="0.035 0.06 0" color="#38d9a9"></a-box>
              </a-entity>
            </a-entity>
          </a-entity>
        </a-entity>
      </a-entity>

      <a-sphere id="target-indicator" radius="0.03" color="#ff6b6b" opacity="0.92"></a-sphere>
    </a-scene>
  </body>
</html>
